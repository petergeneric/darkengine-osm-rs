name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable with i686-pc-windows-gnu target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-gnu

      - name: Install i686-w64-mingw32-gcc
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-i686

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check compilation
        run: cargo check --workspace

      - name: Check compilation (release)
        run: cargo check --workspace --release
